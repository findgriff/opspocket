#cloud-config
# ─────────────────────────────────────────────────────────────────────
# OpsPocket dev box — cloud-init
#
# Paste this into Hetzner Console → Create Server → "Cloud config" field.
# Target box: CX43 in Falkenstein (fsn1), Ubuntu 24.04, your SSH key.
#
# What happens on first boot (takes ~3–4 min):
#   1. System updates + utility packages
#   2. Docker (official convenience script)
#   3. Caddy (from Cloudsmith apt repo) + Cloudflare DNS plugin
#   4. UFW firewall — only 22 / 80 / 443 open
#   5. Placeholder Caddyfile (real config written after we add CF token)
#   6. Marker file at /root/.opspocket-dev-ready
#
# After cloud-init finishes, verify with:
#   ssh root@<ip> 'test -f /root/.opspocket-dev-ready && echo READY'
#   ssh root@<ip> 'docker --version && caddy version'
#
# If anything goes wrong:
#   ssh root@<ip> 'cat /var/log/opspocket/dev-install.log'
# ─────────────────────────────────────────────────────────────────────

hostname: opspocket-dev
manage_etc_hosts: true
package_update: true
package_upgrade: true

packages:
  - curl
  - jq
  - git
  - htop
  - tmux
  - ufw
  - ca-certificates
  - debian-keyring
  - debian-archive-keyring
  - apt-transport-https
  - gnupg

runcmd:
  # NOTE: runcmd runs under /bin/sh (dash) by default — NO bash-isms.
  # We invoke bash explicitly to get process-subst, arrays, etc if needed.
  - ["bash", "-euxc", "mkdir -p /var/log/opspocket"]
  - |
    bash -euxc '
    exec > >(tee -a /var/log/opspocket/dev-install.log) 2>&1

    # ── Docker (official convenience script) ────────────────────────
    curl -fsSL https://get.docker.com | sh
    systemctl enable --now docker

    # ── Caddy (Cloudsmith apt repo — official path) ─────────────────
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
      | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' \
      > /etc/apt/sources.list.d/caddy-stable.list
    apt-get update
    apt-get install -y caddy

    # ── Caddy Cloudflare DNS plugin (for wildcard TLS later) ────────
    caddy add-package github.com/caddy-dns/cloudflare || true

    # ── Firewall: SSH + HTTP + HTTPS only ───────────────────────────
    ufw default deny incoming
    ufw default allow outgoing
    ufw allow 22/tcp
    ufw allow 80/tcp
    ufw allow 443/tcp
    ufw --force enable

    # ── Placeholder Caddyfile (real wildcard config added later) ────
    cat > /etc/caddy/Caddyfile <<'CADDY'
    :80 {
      respond "opspocket-dev — Caddy up, waiting for domain wiring" 200
    }
    CADDY
    systemctl restart caddy

    # ── Marker so we know cloud-init finished cleanly ───────────────
    touch /root/.opspocket-dev-ready
    echo "dev box provisioning complete at $(date -u +%FT%TZ)"
    '
