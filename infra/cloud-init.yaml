#cloud-config
# cloud-init.yaml — one-shot tenant provisioning for OpenClaw + MCP.
#
# Call from the orchestrator when a customer signs up:
#
#   vultr-cli instance create \
#     --region lhr --plan vc2-1c-1gb --os "ubuntu 24.04" \
#     --user-data "$(envsubst < cloud-init.yaml)" \
#     --ssh-keys $SSH_KEY_ID
#
# The orchestrator is expected to substitute:
#   ${TENANT_ID}      e.g. "t_abc123"
#   ${DOMAIN}         e.g. "t-abc123.opspocket.cloud"
#   ${OPENAI_API_KEY} customer's key (or a shared pool key)
#   ${MCP_TOKEN}      per-tenant shared secret
#   ${ADMIN_EMAIL}    ops@opspocket.cloud
#   ${WEBHOOK_URL}    your orchestrator's "I'm ready" callback
#
# The install is idempotent — re-running the bootcmd upgrades in place.

# ── System prep ────────────────────────────────────────────────────────────────
package_update: true
package_upgrade: false   # faster provisioning; we'll patch on a schedule later

# ── Hostname + identity ────────────────────────────────────────────────────────
hostname: tenant-${TENANT_ID}
manage_etc_hosts: true

# ── Users ──────────────────────────────────────────────────────────────────────
# `ops` is our admin escape hatch — don't use for regular customer access.
users:
  - name: ops
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: [sudo]
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ${OPS_SSH_PUBKEY}

# ── One-shot install ───────────────────────────────────────────────────────────
runcmd:
  - [ bash, -c, "mkdir -p /opt/opspocket && cd /opt/opspocket && curl -fsSL https://opspocket.cloud/install.sh -o install.sh && chmod +x install.sh" ]
  - [ bash, -c, "DOMAIN='${DOMAIN}' OPENAI_API_KEY='${OPENAI_API_KEY}' MCP_TOKEN='${MCP_TOKEN}' ADMIN_EMAIL='${ADMIN_EMAIL}' /opt/opspocket/install.sh 2>&1 | tee /var/log/opspocket-install.log" ]
  # Call the orchestrator back so it knows we're live.
  - [ bash, -c, 'curl -fsSL -X POST "${WEBHOOK_URL}" -H "Content-Type: application/json" -d "{\"tenantId\":\"${TENANT_ID}\",\"status\":\"ready\",\"mcpUrl\":\"https://${DOMAIN}/mission-control/api/mcp\"}" || true' ]

# ── Outcome ────────────────────────────────────────────────────────────────────
final_message: |
  OpenClaw tenant ${TENANT_ID} provisioned.
  MCP endpoint: https://${DOMAIN}/mission-control/api/mcp
  Install log:  /var/log/opspocket-install.log
  Uptime at handoff: $UPTIME seconds
