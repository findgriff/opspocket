# /etc/nginx/sites-available/opspocket
#
# OpsPocket marketing site + mission-control bridge, on one server block.
#
# Layout served by this config:
#   /                         → static site at /var/www/opspocket
#   /mission-control/*        → Next.js gateway at 127.0.0.1:3000
#   /health                   → lightweight ping (used by the installer
#                               + future uptime monitor)
#
# The mission-control proxy block preserves the existing behaviour we
# verified earlier in the session — this file can replace whatever was
# previously at /etc/nginx/sites-enabled/default without breaking MCP.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # When we put the site on a real hostname tomorrow, set it here so
    # the default_server + vhost split works cleanly.
    # server_name opspocket.app opspocket.io www.opspocket.app;

    root /var/www/opspocket;
    index index.html;

    # ── Gzip for text responses ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json
        application/xml+rss application/rss+xml
        image/svg+xml;

    # Long-cache immutable Next.js bundles (hashed filenames = safe forever).
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Short-cache HTML pages — we want updates to ship fast on next visit.
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # Long-cache images.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Mission-control bridge (unchanged from prior config) ─────────────
    # The Next.js service at :3000 handles /mission-control/* routes. Keep
    # upgrade headers so the MCP endpoint's SSE/websocket stays alive.
    location /mission-control/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Keep long-poll / SSE connections open.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Ping endpoint — used for deployment checks + the installer ───────
    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }

    # ── Static site (everything else) ────────────────────────────────────
    # Next.js static export emits pretty URLs: /app → /app.html, etc.
    # try_files resolves that without a trailing slash redirect.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html =404;
    }

    # Standard hardening headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
